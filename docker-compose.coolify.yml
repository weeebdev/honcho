# documentation: https://docs.honcho.dev/v3/contributing/self-hosting
# slogan: Infrastructure for AI agents with memory and social cognition
# category: ai
# tags: ai,memory,agents,llm,api
# port: 8000

services:
  honcho:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - SERVICE_FQDN_HONCHO_8000
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${SERVICE_PASSWORD_DATABASE}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY}
      - LLM_OPENAI_BASE_URL=${LLM_OPENAI_BASE_URL}
      # Model — all components use the same LiteLLM-routed model
      - DERIVER_MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - SUMMARY_MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - DREAM_DEDUCTION_MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
      - DREAM_INDUCTION_MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
    networks:
      - default
      - ai-mesh
    restart: unless-stopped

  deriver:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${SERVICE_PASSWORD_DATABASE}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY}
      - LLM_OPENAI_BASE_URL=${LLM_OPENAI_BASE_URL}
      - DERIVER_MODEL_CONFIG__MODEL=${MODEL:-qwen3.7-max}
    restart: unless-stopped

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.7-bookworm
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redis-data:

networks:
  ai-mesh:
    name: ai_mesh
    external: true
